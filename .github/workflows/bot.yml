name: Sakai Duyuru Bot

on:
  schedule:
    # Her gün 08:00 UTC'de çalış (sabah 11:00 Türkiye saati)
    - cron: '0 8 * * *'
  
  # Manuel olarak da çalıştırabilmek için
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Edge browser
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
    
    - name: Run bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SAKAI_USERNAME: ${{ secrets.SAKAI_USERNAME }}
        SAKAI_PASSWORD: ${{ secrets.SAKAI_PASSWORD }}
        SAKAI_URL: https://online.deu.edu.tr/portal
        HEADLESS: 1
      run: python sakai_bot_final.py
    
    - name: Upload duyurular.json
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: duyurular
        path: duyurular.json
        retention-days: 30
